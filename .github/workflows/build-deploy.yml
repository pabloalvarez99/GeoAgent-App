name: Build & Deploy APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Crear google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: Dar permisos a gradlew
        run: chmod +x gradlew

      - name: Build APK Debug
        run: ./gradlew assembleDebug --no-daemon

      - name: Preparar carpeta de deploy
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/geoagent.apk
          cat > dist/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="es">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>GeoAgent - Descargar APK</title>
            <style>
              body { font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #0f172a; color: #f1f5f9; }
              .card { background: #1e293b; border-radius: 16px; padding: 48px; text-align: center; max-width: 420px; width: 90%; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
              h1 { margin: 0 0 8px; font-size: 2rem; color: #38bdf8; }
              p { color: #94a3b8; margin: 0 0 32px; }
              a { display: inline-block; background: #0284c7; color: white; padding: 14px 32px; border-radius: 10px; text-decoration: none; font-weight: 600; font-size: 1.1rem; transition: background 0.2s; }
              a:hover { background: #0369a1; }
              .meta { margin-top: 24px; font-size: 0.8rem; color: #475569; }
            </style>
          </head>
          <body>
            <div class="card">
              <h1>⛰️ GeoAgent</h1>
              <p>App de geología de campo para Android</p>
              <a href="/geoagent.apk" download>⬇ Descargar APK</a>
              <div class="meta">Última build: ${{ github.sha }} · ${{ github.run_number }}</div>
            </div>
          </body>
          </html>
          EOF

      - name: Deploy a Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: dist
          vercel-args: '--prod'
