name: Build & Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  # ── Job 1: Build Android APK + publish to GitHub Releases ───────────────────
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Crear google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: Build APK
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      - name: Publicar APK en GitHub Releases
        run: |
          gh release delete latest --yes 2>/dev/null || true
          gh release create latest \
            app/build/outputs/apk/debug/app-debug.apk#app-debug.apk \
            --title "GeoAgent - Última build" \
            --notes "Build #${{ github.run_number }} · commit ${{ github.sha }}" \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Job 2: Deploy Next.js web app to Vercel ─────────────────────────────────
  deploy-web:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment & build
        run: |
          cd web
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: prj_904BfKPW4v7CEwtpo9Qw3zdUj5BC

      - name: Deploy prebuilt output to Vercel
        run: |
          cd web
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: prj_904BfKPW4v7CEwtpo9Qw3zdUj5BC
