name: Build & Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  # ── Job 1: Build Android APK + create GitHub Release ────────────────────────
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Crear google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: Build APK
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      - name: Publicar APK en GitHub Releases
        run: |
          gh release delete latest --yes 2>/dev/null || true
          gh release create latest \
            app/build/outputs/apk/debug/app-debug.apk#app-debug.apk \
            --title "GeoAgent - Última build" \
            --notes "Build #${{ github.run_number }} · commit ${{ github.sha }}" \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Job 2: Deploy Next.js web app to Vercel ─────────────────────────────────
  deploy-web:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment & build
        run: |
          cd web
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: prj_904BfKPW4v7CEwtpo9Qw3zdUj5BC

      - name: Deploy prebuilt output to Vercel
        run: |
          cd web
          vercel deploy --prebuilt --prod --archive=tgz --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: prj_904BfKPW4v7CEwtpo9Qw3zdUj5BC

  # ── Job 3: Build Electron .exe + upload to existing GitHub Release ───────────
  # Must run after build-apk so the 'latest' release already exists.
  build-electron:
    runs-on: windows-latest
    needs: build-apk
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install web workspace dependencies
        run: cd web && npm install

      - name: Build Next.js static export (for Electron)
        run: cd web/apps/web && npm run build
        env:
          NEXT_EXPORT: '1'
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}

      - name: Install Electron dependencies
        run: cd web/apps/desktop && npm install

      - name: Build Electron TypeScript
        run: cd web/apps/desktop && npx tsc -p tsconfig.electron.json

      - name: Build Electron installer (.exe)
        run: cd web/apps/desktop && npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload .exe to GitHub Releases
        shell: bash
        run: |
          EXE=$(find web/apps/desktop/dist-build -name "*.exe" | head -1)
          if [ -z "$EXE" ]; then
            echo "ERROR: No .exe found in dist-build"
            ls -la web/apps/desktop/dist-build/ || echo "dist-build does not exist"
            exit 1
          fi
          echo "Uploading: $EXE"
          gh release upload latest "$EXE#GeoAgent-Setup.exe" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
