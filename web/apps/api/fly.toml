app = "geoagent-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  FIREBASE_PROJECT_ID = "geoagent-app"
  PORT = "8080"
  RUST_LOG = "geoagent_api=info,tower_http=info"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
